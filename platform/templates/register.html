{% extends "base.html" %}
{% block title %}Registro{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:85vh">
  <div style="width:100%;max-width:460px;padding:0 16px">

    <div class="text-center mb-4">
      <div style="font-size:3rem">🧑‍💻</div>
      <h2 class="fw-bold mt-2" style="color:var(--accent)">Crear cuenta</h2>
      <p style="color:var(--muted);font-size:.9rem">{{ ctf_name }}</p>
    </div>

    <div class="card p-4">
      <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
          <label class="form-label">Nombre de usuario</label>
          <input type="text" name="username" class="form-control form-control-lg"
                 placeholder="Ej: hacker_paco" minlength="3" maxlength="30"
                 autocomplete="username" autofocus required>
          <div class="form-text" style="color:var(--muted)">
            Solo letras, números y guiones bajos. Mínimo 3 caracteres.
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control form-control-lg"
                 placeholder="tu@email.com" autocomplete="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 placeholder="Mínimo 6 caracteres" minlength="6"
                 autocomplete="new-password" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Repetir contraseña</label>
          <input type="password" name="confirm" class="form-control form-control-lg"
                 placeholder="Repite la contraseña" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-ctf btn-lg w-100">
          <i class="bi bi-person-plus me-2"></i>Crear cuenta y entrar
        </button>
      </form>
    </div>

    <p class="text-center mt-3" style="color:var(--muted);font-size:.9rem">
      ¿Ya tienes cuenta?
      <a href="{{ url_for('login') }}" style="color:var(--accent)">Inicia sesión</a>
    </p>

  </div>
</div>
{% endblock %}
