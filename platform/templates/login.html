{% extends "base.html" %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:85vh">
  <div style="width:100%;max-width:420px;padding:0 16px">

    <div class="text-center mb-4">
      <div style="font-size:3rem">🔑</div>
      <h2 class="fw-bold mt-2" style="color:var(--accent)">Entrar al CTF</h2>
      <p style="color:var(--muted);font-size:.9rem">{{ ctf_name }}</p>
    </div>

    <div class="card p-4">
      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input type="text" name="username" class="form-control form-control-lg"
                 placeholder="tu_usuario" autocomplete="username" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-ctf btn-lg w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>
    </div>

    <p class="text-center mt-3" style="color:var(--muted);font-size:.9rem">
      ¿Sin cuenta aún?
      <a href="{{ url_for('register') }}" style="color:var(--accent)">Regístrate aquí</a>
    </p>

  </div>
</div>
{% endblock %}
