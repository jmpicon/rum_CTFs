# ============================================================
# CTF Docente – Stack completo (sin dependencias externas)
#
# Cómo usar:
#   1. Construir:  docker compose build
#   2. Levantar:   docker compose up -d
#   3. Ver logs:   docker compose logs -f ctf
#   4. Abrir:      http://localhost:7000
#      Admin:      usuario=admin  contraseña=ctf_admin_2024
#
# Para producción con dominio propio:
#   - Configura CTF_DOMAIN y ACME_EMAIL
#   - Descomenta el servicio 'traefik' al final
# ============================================================

services:

  # ── Plataforma CTF (Flask + SQLite) ───────────────────────
  ctf:
    build: .
    restart: unless-stopped
    environment:
      - CTF_NAME=${CTF_NAME:-CTF Docente}
      - SECRET_KEY=${SECRET_KEY:-CAMBIA_ESTO_EN_PRODUCCION_2024}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ctf_admin_2024}
      - DATABASE_URL=sqlite:////data/ctf.db
    volumes:
      - ctf_data:/data
      - ../challenges:/challenges:ro
    ports:
      - "${CTF_PORT:-7000}:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Retos Web: robots_secretos (fácil) ────────────────────
  web-robots:
    build: ../challenges/web/facil/robots_secretos/service
    restart: unless-stopped
    environment:
      - FLAG=${FLAG_ROBOTS:-CTF{robots_txt_no_es_seguridad}}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Retos Web: cookie_falsa (medio) ───────────────────────
  web-cookie:
    build: ../challenges/web/medio/cookie_falsa/service
    restart: unless-stopped
    environment:
      - FLAG=${FLAG_COOKIE:-CTF{nunca_confies_en_el_cliente}}
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Retos Web: sqli_login (medio) ─────────────────────────
  web-sqli:
    build: ../challenges/web/medio/sqli_login/service
    restart: unless-stopped
    environment:
      - FLAG=${FLAG_SQLI:-CTF{sqli_las_comillas_mandan}}
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Retos Web: admin_roto / IDOR (avanzado) ───────────────
  web-admin:
    build: ../challenges/web/avanzado/admin_roto/service
    restart: unless-stopped
    environment:
      - FLAG=${FLAG_ADMIN:-CTF{idor_el_id_no_es_autorizacion}}
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  ctf_data:

