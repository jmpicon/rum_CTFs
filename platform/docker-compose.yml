version: '3.7'

# ============================================================
# CTFd Stack – Docker Swarm
# Despliegue: docker stack deploy -c docker-compose.yml ctf
#
# ANTES de desplegar, construye la imagen de CTFd con:
#   docker build -t ctfd-custom:latest ./platform/
# Y la imagen de los retos web:
#   bash install.sh
# ============================================================

services:

  # ── Base de Datos ──────────────────────────────────────────
  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-cambiame_root_2024}
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=${DB_PASSWORD:-cambiame_ctfd_2024}
      - MARIADB_DATABASE=ctfd
    networks:
      - ctf_internal
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost",
             "-u", "ctfd", "--password=${DB_PASSWORD:-cambiame_ctfd_2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Caché (Redis) ──────────────────────────────────────────
  cache:
    image: redis:7-alpine
    restart: always
    networks:
      - ctf_internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Portal CTFd + Plugin Whale ─────────────────────────────
  # La imagen se construye ANTES del deploy: docker build -t ctfd-custom:latest ./platform/
  ctfd:
    image: ctfd-custom:latest
    user: root   # necesario para acceder al socket Docker (Whale plugin)
    restart: always
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfd:${DB_PASSWORD:-cambiame_ctfd_2024}@db/ctfd
      - REDIS_URL=redis://cache:6379
      - WORKERS=4
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
      - SECRET_KEY=${CTF_SECRET_KEY:-cambia_esta_clave_secreta_ahora}
    volumes:
      - ctfd_logs:/var/log/CTFd
      - ctfd_uploads:/var/uploads
      # Whale necesita hablar con el daemon Docker (Swarm)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: host
    networks:
      - ctf_internal
      - proxy_net
      - challenge_net
    depends_on:
      - db
      - cache
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ctfd.rule=Host(`${CTF_DOMAIN:-ctf.tu-instituto.edu}`)"
        - "traefik.http.routers.ctfd.entrypoints=websecure"
        - "traefik.http.routers.ctfd.tls.certresolver=letsencrypt"
        - "traefik.http.services.ctfd.loadbalancer.server.port=8000"
        # Redirigir HTTP → HTTPS
        - "traefik.http.routers.ctfd-http.rule=Host(`${CTF_DOMAIN:-ctf.tu-instituto.edu}`)"
        - "traefik.http.routers.ctfd-http.entrypoints=web"
        - "traefik.http.routers.ctfd-http.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  # ── Proxy Inverso (Traefik) ────────────────────────────────
  traefik:
    image: traefik:v3.3
    command:
      - "--log.level=INFO"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-profesor@tu-instituto.edu}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - traefik_certs:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy_net
      - ctf_internal
      - challenge_net
    deploy:
      placement:
        constraints:
          - node.role == manager

volumes:
  db_data:
  redis_data:
  ctfd_logs:
  ctfd_uploads:
  traefik_certs:

networks:
  proxy_net:
    external: true
  ctf_internal:
    external: true
  challenge_net:
    external: true
