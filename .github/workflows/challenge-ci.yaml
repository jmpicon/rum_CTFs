name: challenge-ci

on:
  push:
    paths: ["challenges/**"]
  pull_request:
    paths: ["challenges/**"]

jobs:
  # ── Lint: verifica que todos los challenge.yml son válidos ──
  lint-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar challenge.yml obligatorios
        run: |
          set -e
          for yml in $(find challenges -name "challenge.yml"); do
            echo "Checking $yml..."
            python3 - <<EOF
          import yaml, sys
          required = {"name","category","description","value","flags"}
          data = yaml.safe_load(open("$yml"))
          missing = required - set(data.keys())
          if missing:
              print(f"FAIL {yml}: faltan campos {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"OK  {yml}")
          EOF
          done

  # ── Construir y testar retos estáticos (crypto, forense, reversing) ──
  test-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generar artefactos binarios (forense / reversing)
        run: |
          # Imagen con metadatos EXIF
          if [ -f challenges/forense/facil/metadatos_reveladores/gen.py ]; then
            cd challenges/forense/facil/metadatos_reveladores && python3 gen.py && cd -
          fi
          # PCAP de tráfico
          if [ -f challenges/forense/medio/trafico_sospechoso/gen.py ]; then
            cd challenges/forense/medio/trafico_sospechoso && python3 gen.py && cd -
          fi
          # Bytecode Python
          if [ -f challenges/reversing/facil/pyc_misterioso/gen.py ]; then
            cd challenges/reversing/facil/pyc_misterioso && python3 gen.py && cd -
          fi

      - name: Ejecutar tests estáticos
        run: |
          pytest -q \
            challenges/crypto/ \
            challenges/forense/ \
            challenges/reversing/ \
            --tb=short -v

  # ── Construir y testar retos Docker ──
  test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: pip install requests pytest

      - name: Construir imágenes de retos web
        run: |
          for svc in $(find challenges/web -name "Dockerfile" -exec dirname {} \;); do
            tag="ctf-$(echo $svc | tr '/' '-' | sed 's/^-//')"
            echo "Building $tag from $svc"
            docker build -t "$tag" "$svc"
          done

      - name: Levantar y testar robots_secretos
        run: |
          docker run -d --name test-robots -p 8081:8080 \
            ctf-challenges-web-facil-robots_secretos-service
          sleep 3
          pytest -q challenges/web/facil/robots_secretos/tests/ \
            --tb=short -v \
            -k "not requires_docker" \
            || true
          docker rm -f test-robots || true

      - name: Levantar y testar cookie_falsa
        run: |
          docker run -d --name test-cookie -p 8082:8080 \
            ctf-challenges-web-medio-cookie_falsa-service
          sleep 3
          pytest -q challenges/web/medio/cookie_falsa/tests/ --tb=short -v || true
          docker rm -f test-cookie || true

      - name: Levantar y testar sqli_login
        run: |
          docker run -d --name test-sqli -p 8083:8080 \
            ctf-challenges-web-medio-sqli_login-service
          sleep 3
          pytest -q challenges/web/medio/sqli_login/tests/ --tb=short -v || true
          docker rm -f test-sqli || true

      - name: Levantar y testar admin_roto
        run: |
          docker run -d --name test-admin -p 8084:8080 \
            ctf-challenges-web-avanzado-admin_roto-service
          sleep 3
          pytest -q challenges/web/avanzado/admin_roto/tests/ --tb=short -v || true
          docker rm -f test-admin || true
